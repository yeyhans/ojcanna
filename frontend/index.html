<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <title>Observatorio Judicial Cannábico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      // Tema por ruta aplicado ANTES del primer paint (sin FOUC):
      //   "/" → light (mapa coropleta)
      //   cualquier otra ruta → dark (analytics)
      // React sincroniza en cada navegación via useEffect en App.tsx.
      (function () {
        try {
          var p = window.location.pathname;
          var theme = (p === '/' || p === '') ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (_) { /* fallback al default HTML (dark) */ }
      })();
    </script>

    <!-- Acorta el camino crítico: TCP+TLS al backend y al CDN del basemap se
         abren mientras Vite aún parsea main.tsx. -->
    <link rel="preconnect" href="https://ojcanna.onrender.com" crossorigin />
    <link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin />

    <!-- Pre-fetch del par crítico: filtros y geometrías. La respuesta llega
         al cache HTTP del browser; cuando el JS hace fetch() encuentra el
         buffer servido sin nueva ida al servidor. -->
    <link rel="preload" as="fetch" href="/api/v1/cead/filtros" crossorigin />
    <link rel="preload" as="fetch" href="/api/v1/cead/geometrias" crossorigin />

    <!-- Preload de la fuente para evitar FOUT del título principal -->
    <link rel="preload" as="font" type="font/ttf" href="/fonts/CalSans-Regular.ttf" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
